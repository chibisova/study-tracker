let currentWeek = 0;
let state = {};

function getKey(weekIdx, dayIdx, taskIdx) {
  return `w${weekIdx}_d${dayIdx}_t${taskIdx}`;
}

function loadState() {
  try { state = JSON.parse(localStorage.getItem('studytracker') || '{}'); } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem('studytracker', JSON.stringify(state));
}

function toggleTask(weekIdx, dayIdx, taskIdx) {
  const key = getKey(weekIdx, dayIdx, taskIdx);
  state[key] = !state[key];
  saveState();
  render();
}

function getToday() {
  const now = new Date();
  now.setHours(0,0,0,0);
  return now;
}

function getWeekStart(weekIdx) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + weekIdx * 7);
  return d;
}

function getDayDate(weekIdx, dayIdx) {
  const d = getWeekStart(weekIdx);
  d.setDate(d.getDate() + dayIdx);
  return d;
}

function isToday(weekIdx, dayIdx) {
  const d = getDayDate(weekIdx, dayIdx);
  const today = getToday();
  return d.getTime() === today.getTime();
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function countStats() {
  let totalTasks = 0, doneTasks = 0, leet = 0;
  WEEKS.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      d.tasks.forEach((t, ti) => {
        totalTasks++;
        if (state[getKey(wi, di, ti)]) {
          doneTasks++;
          if (t.tag === 'leet') leet++;
        }
      });
    });
  });
  const today = getToday();
  let daysDone = 0;
  for (let wi = 0; wi < WEEKS.length; wi++) {
    for (let di = 0; di < 5; di++) {
      const d = getDayDate(wi, di);
      if (d > today) break;
      const wk = WEEKS[wi];
      const tasks = wk.days[di].tasks;
      const allDone = tasks.every((t, ti) => state[getKey(wi, di, ti)]);
      if (allDone && tasks.length > 0) daysDone++;
    }
  }
  let streak = 0;
  let check = new Date(today);
  while (true) {
    check.setDate(check.getDate() - 1);
    if (check < START_DATE) break;
    const diff = Math.round((check - START_DATE) / 86400000);
    const wi = Math.floor(diff / 7);
    const di = diff % 7;
    if (wi >= WEEKS.length || di >= 5) continue;
    const tasks = WEEKS[wi].days[di].tasks;
    if (tasks.every((t, ti) => state[getKey(wi, di, ti)]) && tasks.length > 0) streak++;
    else break;
  }
  return { totalTasks, doneTasks, leet, daysDone, streak };
}

function isMilestoneDone(m) {
  const wi = m.week - 1;
  const week = WEEKS[wi];
  let found = false;
  week.days.forEach((d, di) => {
    d.tasks.forEach((t, ti) => {
      if (t.tag === 'milestone' && state[getKey(wi, di, ti)]) found = true;
    });
  });
  return found;
}

function render() {
  const today = getToday();
  const stats = countStats();

  document.getElementById('today-label').textContent =
    today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
    ' · June 2 – August 22';

  document.getElementById('stat-days').textContent = stats.daysDone;
  document.getElementById('stat-tasks').textContent = stats.doneTasks;
  document.getElementById('stat-leet').textContent = stats.leet;
  document.getElementById('stat-streak').textContent = stats.streak + (stats.streak === 1 ? ' day' : ' days');
  document.getElementById('pb-days').style.width = Math.round(stats.daysDone / 60 * 100) + '%';
  document.getElementById('pb-tasks').style.width = Math.round(stats.doneTasks / stats.totalTasks * 100) + '%';
  document.getElementById('pb-leet').style.width = Math.round(stats.leet / 60 * 100) + '%';
  document.getElementById('pb-streak').style.width = Math.min(100, Math.round(stats.streak / 14 * 100)) + '%';

  const week = WEEKS[currentWeek];
  document.getElementById('week-title').textContent = week.title + ' — ' + week.focus;
  const ws = getWeekStart(currentWeek);
  const we = new Date(ws); we.setDate(we.getDate() + 4);
  document.getElementById('week-dates').textContent = formatDate(ws) + ' – ' + formatDate(we);
  const badge = document.getElementById('week-phase-badge');
  badge.textContent = 'Phase ' + week.phase;
  badge.className = 'week-phase phase-' + week.phase;

  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  week.days.forEach((day, di) => {
    const dayDate = getDayDate(currentWeek, di);
    const isFuture = dayDate > today;
    const todayDay = isToday(currentWeek, di);
    const card = document.createElement('div');
    card.className = 'day-card' + (todayDay ? ' today' : '');
    let header = `<div class="day-header"><div><div class="day-name">${day.label}</div><div class="day-date">${formatDate(dayDate)}</div></div>${todayDay ? '<span class="today-badge">today</span>' : ''}</div>`;
    let tasks = '<ul class="tasks">';
    day.tasks.forEach((task, ti) => {
      const key = getKey(currentWeek, di, ti);
      const done = !!state[key];
      tasks += `<li class="task-item" onclick="toggleTask(${currentWeek},${di},${ti})">
        <div class="task-check ${done ? 'done' : ''}"></div>
        <span class="task-label ${done ? 'done' : ''}">${task.text}</span>
        <span class="task-tag tag-${task.tag}">${task.tag}</span>
      </li>`;
    });
    tasks += '</ul>';
    card.innerHTML = header + tasks;
    grid.appendChild(card);
  });

  const ml = document.getElementById('milestones-list');
  ml.innerHTML = '';
  MILESTONES.forEach(m => {
    const done = isMilestoneDone(m);
    const weekStart = getWeekStart(m.week - 1);
    const item = document.createElement('div');
    item.className = 'milestone-item';
    const dotClass = done ? 'done' : m.urgent ? 'urgent' : 'upcoming';
    item.innerHTML = `<div class="m-dot ${dotClass}"></div><div class="m-text" style="${done ? 'text-decoration:line-through;color:#aaa' : ''}">${m.text}</div><div class="m-date">${m.tag} · ${formatDate(weekStart)}</div>`;
    ml.appendChild(item);
  });

  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';
  for (let i = 0; i < 84; i++) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + i);
    const wi = Math.floor(i / 7);
    const di = i % 7;
    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    if (d > today) {
      cell.style.opacity = '0.3';
    } else if (wi < WEEKS.length && di < 5) {
      const tasks = WEEKS[wi].days[di].tasks;
      const doneCount = tasks.filter((t, ti) => state[getKey(wi, di, ti)]).length;
      if (doneCount === tasks.length && tasks.length > 0) cell.classList.add('active');
      else if (doneCount > 0) cell.classList.add('partial');
    }
    heatmap.appendChild(cell);
  }
}

function prevWeek() { if (currentWeek > 0) { currentWeek--; render(); } }
function nextWeek() { if (currentWeek < WEEKS.length - 1) { currentWeek++; render(); } }

function autoSelectWeek() {
  const today = getToday();
  for (let wi = 0; wi < WEEKS.length; wi++) {
    const ws = getWeekStart(wi);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    if (today >= ws && today <= we) { currentWeek = wi; return; }
  }
  if (today < START_DATE) currentWeek = 0;
  else currentWeek = WEEKS.length - 1;
}

loadState();
autoSelectWeek();
render();
</script>
